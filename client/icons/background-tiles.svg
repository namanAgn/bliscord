<svg width="1024" height="768" viewBox="0 0 360 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="perfectChatPattern" x="0" y="0" width="360" height="280" patternUnits="userSpaceOnUse">
      <rect width="360" height="280" fill="#212121"/>
      
      <!-- 28 PERFECTLY PLACED, UNIQUELY VARIED ICONS -->
      
      <!-- Chat bubbles (8 variations - size 0.5-0.9, rotations -90° to 90°) -->
      <g transform="translate(20,30) scale(0.62)"><path d="M0 0Q25 0 28 12 32 22 18 28 5 32 0 28Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.3" stroke-linejoin="round"/></g>
      <g transform="translate(95,25) scale(0.78) rotate(15)"><path d="M0 0Q25 0 28 12 32 22 18 28 5 32 0 28Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.3" stroke-linejoin="round"/></g>
      <g transform="translate(180,35) scale(0.55) rotate(-35)"><path d="M0 0Q25 0 28 12 32 22 18 28 5 32 0 28Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.3" stroke-linejoin="round"/></g>
      <g transform="translate(320,28) scale(0.85) rotate(8)"><path d="M0 0Q25 0 28 12 32 22 18 28 5 32 0 28Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.3" stroke-linejoin="round"/></g>
      
      <!-- Send arrows (6 variations - every direction) -->
      <g transform="translate(50,85) scale(0.68) rotate(-20)"><path d="M0 0L22 8Q25 11 22 14L4 20Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.1"/></g>
      <g transform="translate(280,95) scale(0.72) rotate(75)"><path d="M0 0L22 8Q25 11 22 14L4 20Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.1"/></g>
      <g transform="translate(220,70) scale(0.6) rotate(160)"><path d="M0 0L22 8Q25 11 22 14L4 20Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.1"/></g>
      
      <!-- Typing indicators (5 clusters - horizontal/vertical/diagonal) -->
      <g transform="translate(140,80) scale(0.65)"><circle cx="0" cy="0" r="5.8" fill="#2c2c2c"/><circle cx="17" cy="0" r="6.2" fill="#2c2c2c"/><circle cx="34" cy="0" r="5.9" fill="#2c2c2c"/></g>
      <g transform="translate(340,160) scale(0.6) rotate(90)"><circle cx="0" cy="0" r="5.8" fill="#2c2c2c"/><circle cx="17" cy="0" r="6.2" fill="#2c2c2c"/><circle cx="34" cy="0" r="5.9" fill="#2c2c2c"/></g>
      
      <!-- Emojis (4 sizes, 4 orientations) -->
      <g transform="translate(260,45) scale(0.7)"><circle cx="0" cy="0" r="15" fill="#2c2c2c" stroke="#404040" stroke-width="1.4"/><circle cx="-4" cy="-2" r="1.7" fill="#404040"/><circle cx="4" cy="-2" r="1.7" fill="#404040"/></g>
      <g transform="translate(40,140) scale(0.62) rotate(180)"><circle cx="0" cy="0" r="15" fill="#2c2c2c" stroke="#404040" stroke-width="1.4"/><circle cx="-4" cy="-2" r="1.7" fill="#404040"/><circle cx="4" cy="-2" r="1.7" fill="#404040"/></g>
      
      <!-- Paperclips (perfect gap fillers) -->
      <g transform="translate(170,120) scale(0.58) rotate(30)"><path d="M0 0Q7 -1 10 0L10 15Q10 20 5 20Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.1"/></g>
      <g transform="translate(310,200) scale(0.52) rotate(-50)"><path d="M0 0Q7 -1 10 0L10 15Q10 20 5 20Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.1"/></g>
      
      <!-- Microphones (varied orientations) -->
      <g transform="translate(80,200) scale(0.66)"><path d="M0 0Q5 0 7 3L7 12Q7 16 3 18Q0 18 -3 16Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.2"/></g>
      <g transform="translate(20,220) scale(0.7) rotate(-90)"><path d="M0 0Q5 0 7 3L7 12Q7 16 3 18Q0 18 -3 16Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.2"/></g>
      
      <!-- Fillers & connectors -->
      <circle cx="355" cy="255" r="2.8" fill="#2c2c2c"/>
      <circle cx="70" cy="260" r="2.3" fill="#2c2c2c"/>
      <path d="M200 100Q230 125 260 105" stroke="#2c2c2c" stroke-width="1.2" stroke-linecap="round" opacity="0.6" fill="none"/>
      
      <!-- LOWER ROW - maximum density -->
      <g transform="translate(130,210) scale(0.74) rotate(-12)"><path d="M0 0Q25 0 28 12 32 22 18 28 5 32 0 28Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.3"/></g>
      <g transform="translate(250,225) scale(0.68)"><circle cx="0" cy="0" r="15" fill="#2c2c2c" stroke="#404040" stroke-width="1.4"/></g>
      <g transform="translate(340,240) scale(0.6) rotate(25)"><path d="M0 0L22 8Q25 11 22 14L4 20Z" fill="#2c2c2c" stroke="#404040" stroke-width="1.1"/></g>
      <g transform="translate(15,255) scale(0.64)"><circle cx="0" cy="0" r="5.8" fill="#2c2c2c"/><circle cx="17" cy="0" r="6.2" fill="#2c2c2c"/></g>
    </pattern>
  </defs>
  <rect width="1024" height="768" fill="url(#perfectChatPattern)"/>
</svg>
