<svg width="197" height="80" viewBox="0 0 197 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid #8E3B3B background -->
  <rect width="197" height="80" rx="8" fill="#8E3B3B"/>
  
  <!-- Larger Abstract Symbol (right side, centered) -->
  <g transform="translate(145, 40)" opacity="0.95">
    <!-- Larger outer hexagon -->
    <polygon points="0,22 16,11 32,22 32,49 16,60 0,49" 
             fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round"/>
    <!-- Larger inner circle -->
    <circle cx="16" cy="36" r="9" fill="#FFFFFF" opacity="0.85"/>
  </g>
  
  <!-- Glow effect for symbol -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#FFFFFF" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Glow on symbol -->
  <g filter="url(#glow)">
    <polygon points="0,22 16,11 32,22 32,49 16,60 0,49" fill="none"/>
    <circle cx="16" cy="36" r="9" fill="none"/>
  </g>
</svg>
