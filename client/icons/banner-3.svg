<svg width="197" height="80" viewBox="0 0 197 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark grey middle: #0a1f14 -->
  <rect width="197" height="80" rx="16" fill="#0a1f14"/>
  
  <!-- Bright green border matching #22c55e with transparency -->
  <rect x="2" y="2" width="193" height="76" rx="6" 
        fill="none" 
        stroke="rgba(34, 197, 94, 0.3)" 
        stroke-width="4"
        stroke-linejoin="round"/>
  
  <!-- Glow effect matching green theme -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#22c55e" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Glow on symbol -->
  <g filter="url(#glow)">
    <polygon points="0,22 16,11 32,22 32,49 16,60 0,49" fill="none"/>
    <circle cx="16" cy="36" r="9" fill="none"/>
  </g>
</svg>
